<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ElevatorPro - Asansör Bakım & Stok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>






    <style>
        .notification-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>













</head>
<body>
        {% if user.is_authenticated %}
        <!-- Sadece giriş yapılmışsa navbar göster -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="{% url 'dashboard' %}">ElevatorPro</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                        <a class="nav-link" href="{% url 'elevators' %}">Asansörler</a>
                        <a class="nav-link" href="{% url 'tasks' %}">Bakım Görevleri</a>



                        <a class="nav-link" href="{% url 'customers' %}">Müşteriler</a>          <!-- YENİ -->



                        <a href="{% url 'notification_log' %}" 
                        class="nav-link position-relative {% if unread_count > 0 %}notification-pulse{% endif %}">
                            Bildirimler
                            {% if unread_count > 0 %}
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                {{ unread_count }}
                            </span>
                            {% endif %}
                        </a>












                        <a class="nav-link" href="{% url 'parts' %}">Stok</a>
                        <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>

                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="nav-link">
                                Çıkış
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>


        <div class="modal fade" id="notifyModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Müşteriye Bildirim Gönder</h5>
                </div>
                <div class="modal-body">
                    <textarea id="messageText" class="form-control" rows="5"></textarea>
                    <select id="channelSelect" class="form-select mt-3">
                    <option value="whatsapp">WhatsApp</option>
                    <option value="email">E-posta</option>
                    <option value="telegram">Telegram</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success" onclick="sendNotification()">Gönder</button>
                </div>
                </div>
            </div>
            </div>

            <script>
            function sendNotification() {
                const message = document.getElementById('messageText').value;
                const channel = document.getElementById('channelSelect').value;
                const taskId = document.querySelector('#notifyModal').dataset.taskId;
                const customerId = document.querySelector('#notifyModal').dataset.customerId;

                fetch(`/notify/send/`, {
                    method: 'POST',
                    headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/json'},
                    body: JSON.stringify({task_id: taskId, customer_id: customerId, channel: channel, message: message})
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) alert('Bildirim gönderildi!');
                    else alert('Hata: ' + data.error);
                    location.reload();
                });
            }
            </script>
    {% endif %}

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    














    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Bildirimler linkine tıklayınca tüm bildirimleri okundu yap
            const notifLink = document.querySelector('a[href="{% url "notification_log" %}"]');
            if (notifLink) {
                notifLink.addEventListener('click', function() {
                    fetch("{% url 'mark_all_notifications_read' %}")
                        .then(() => {
                            // Sayfayı yenilemeden badge'i kaldır
                            const badge = notifLink.querySelector('.badge');
                            if (badge) badge.remove();
                            notifLink.classList.remove('notification-pulse');
                        });
                });
            }
        });
    </script>















</body>
</html>
